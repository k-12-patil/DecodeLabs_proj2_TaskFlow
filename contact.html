<header>

<nav class="navbar">

<section class="section">

<h2 class="section-title">
Contact Us
</h2>

<form
class="contact-form"
onsubmit="return validateForm()">

<input
type="text"
id="name"
placeholder="Your Name">

<input
type="email"
id="email"
placeholder="Your Email">

<input
type="tel"
id="phone"
placeholder="Phone Number">

<textarea
rows="5"
placeholder="Your Message">
</textarea>

<button type="submit">
Submit
</button>

</form>

</section>

<footer>

<p>© 2026 TasteHub Restaurant</p>

</footer>
